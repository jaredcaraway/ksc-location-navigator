<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            max-height: 480px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 16px 0;
            flex-shrink: 0;
        }

        .title {
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 4px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            color: #475569;
            pointer-events: none;
        }

        #search {
            width: 100%;
            padding: 10px 12px 10px 34px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #search:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        #search::placeholder {
            color: #475569;
        }

        .count {
            padding: 6px 16px 2px;
            font-size: 11px;
            color: #475569;
            flex-shrink: 0;
        }

        .list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 8px;
            scrollbar-width: thin;
            scrollbar-color: #334155 transparent;
        }

        .list::-webkit-scrollbar {
            width: 6px;
        }

        .list::-webkit-scrollbar-track {
            background: transparent;
        }

        .list::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        .location {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s;
            text-decoration: none;
            color: inherit;
        }

        .location:hover,
        .location.active {
            background: #1e293b;
        }

        .location.active {
            outline: 1px solid #334155;
        }

        .location-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #6366f1;
            flex-shrink: 0;
        }

        .location-name {
            font-size: 13px;
            color: #e2e8f0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .location-name mark {
            background: rgba(99, 102, 241, 0.3);
            color: #c7d2fe;
            border-radius: 2px;
            padding: 0 1px;
        }

        .location-arrow {
            color: #334155;
            font-size: 14px;
            flex-shrink: 0;
            transition: color 0.1s;
        }

        .location:hover .location-arrow {
            color: #6366f1;
        }

        .empty {
            padding: 32px 16px;
            text-align: center;
            color: #475569;
            font-size: 13px;
        }

        .campus-badge {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 5px;
            border-radius: 3px;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            flex-shrink: 0;
        }

        .tabs {
            display: flex;
            padding: 0 16px;
            gap: 2px;
            flex-shrink: 0;
            margin-bottom: 4px;
        }

        .tab {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab:hover {
            color: #94a3b8;
        }

        .tab.active {
            color: #c7d2fe;
            border-bottom-color: #6366f1;
        }

        .specialty-dot {
            width: 6px;
            height: 6px;
            border-radius: 2px;
            background: #8b5cf6;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">KSC Locations</div>
        <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search" placeholder="Search locations..." autofocus>
        </div>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="locations">Locations</button>
        <button class="tab" data-tab="specialties">Specialties</button>
    </div>
    <div class="count" id="count"></div>
    <div class="list" id="list"></div>

    <script src="locations.js"></script>
    <script src="specialties.js"></script>
    <script src="popup.js"></script>
</body>
</html>
